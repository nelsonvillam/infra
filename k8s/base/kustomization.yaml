apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared infrastructure for all environments.
# Service deployments (shop, gateway, ping-service) live in their own repos
# and are deployed independently by each service's Jenkins pipeline.
resources:
  - namespace.yaml
  - external-secrets/mongodb-credentials-es.yaml
  - external-secrets/mongodb-keyfile-es.yaml
  - external-secrets/shop-secret-es.yaml
  - mongodb/headless-service.yaml
  - mongodb/service.yaml
  - mongodb/statefulset.yaml
  - mongodb/rs-init-job.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - zipkin/deployment.yaml
  - zipkin/service.yaml
