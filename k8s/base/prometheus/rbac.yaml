apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: shop
---
# Namespaced Role, not ClusterRole — Prometheus only needs to discover
# pods within the shop namespace for kubernetes_sd_configs (role: pod).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus
  namespace: shop
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus
  namespace: shop
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: shop
roleRef:
  kind: Role
  name: prometheus
  apiGroup: rbac.authorization.k8s.io
