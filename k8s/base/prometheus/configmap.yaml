apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: shop
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["shop:80"]

      - job_name: gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["gateway:80"]

      - job_name: ping-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["ping-service:8080"]
